app = "jst-server"
primary_region = "iad"
kill_timeout = "30s"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "2s"

[env]
  RUST_LOG = "jst_server=info"
  MAX_CONCURRENT_TRANSLATIONS = "32"
  MONTHLY_REQUEST_LIMIT = "1000"
  REQUESTS_PER_MINUTE = "20"
  LLM_API_URL = "https://openrouter.ai/api/v1/chat/completions"
  LLM_MODEL = "ibm-granite/granite-4.1-8b"
